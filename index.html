<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AeroFold V2 - styled to reference</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background: #78bbf2;
            overflow: hidden;
            font-family: sans-serif;
        }

        #hint {
            position: absolute;
            top: 12px;
            left: 16px;
            color: #999;
            font-size: 12px;
        }


        #panel {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: rgba(25, 25, 25, 0.9);
            padding: 14px 18px;
            border-radius: 10px;
            color: #eee;
        }

        #row1 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        #row1 label {
            font-size: 13px;
            color: #aaa;
            min-width: 80px;
        }

        #row1 input[type=range] {
            flex: 1;
        }

        #row1 span {
            font-size: 13px;
            font-weight: 600;
            min-width: 150px;
            text-align: right;
        }

        #row2 {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            background: #2a2a2a;
            color: #eee;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
        }

        button:hover {
            background: #3a3a3a;
        }

        .label {
            position: absolute;
            color: #eee;
            font-size: 11px;
            background: rgba(20, 20, 20, 0.8);
            padding: 2px 6px;
            border-radius: 4px;
            pointer-events: none;
            white-space: nowrap;
            transform: translate(-50%, -50%);
        }

        canvas { touch-action: none; }

        @media (max-width: 600px) {
            #hint { font-size: 10px; top: 6px; left: 8px; }
            #panel {
                bottom: 8px; left: 8px; right: 8px;
                padding: 10px 12px;
            }
            #row1 { gap: 6px; margin-bottom: 6px; }
            #row1 span { min-width: 90px; font-size: 11px; }
            button { padding: 5px 8px; font-size: 11px; }
            #row2 { gap: 5px; }
        }
    </style>
</head>

<body>
    <div id="hint">Drag to orbit &middot; scroll to zoom &middot; real-scale, meters</div>
    <div id="labels"></div>
    <div id="panel">
        <div id="row1">
            <input type="range" id="fold" min="0" max="100" value="0">
            <span id="foldOut">Folded, stowed</span>
        </div>
        <div id="row2">
            <button id="playDeploy">Play deploy</button>
            <button id="playFold">Play fold</button>
            <button data-cam="wide">Wide view</button>
            <button data-cam="top">Top view</button>
            <button data-cam="hinge">Hinge closeup</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // === Aerofold V2 Wing Geometry (1.6 m span) — mechanics unchanged, appearance restyled ===
        const wingspan = 1.6;
        const halfSpan = 0.8000;
        const rootStubLen = 0.240000;
        const rotatingSpan = 0.684000;
        const rootChord = 0.30;
        const stubTipChord = 0.2772;
        const tipChord = 0.16;
        const wingThick = 0.028;
        const innerStationFrac = 0.03;
        const outerStationFrac = 0.41;
        const innerNacelleSpanFromHinge = innerStationFrac * rotatingSpan;
        const outerNacelleSpanFromHinge = outerStationFrac * rotatingSpan;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.01, 100);
        camera.position.set(1.8, 1.3, 2.0);
        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: true
        });
        renderer.setClearColor(0x000000, 0);
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.physicallyCorrectLights = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);

        scene.add(new THREE.AmbientLight(0xffffff, 1.15));
        const key = new THREE.DirectionalLight(0xffffff, 2.3);
        key.position.set(3, 5, 4);
        scene.add(key);
        const fill = new THREE.DirectionalLight(0xffffff, 1.1);
        fill.position.set(-5, 3, -2);
        scene.add(fill);
        const rim = new THREE.DirectionalLight(0xffffff, 1.0);
        rim.position.set(-2, 5, 5);
        scene.add(rim);


        // ---- Reference-matched palette (pearl white / dark blackish-teal, per photos) ----
        const airframeWhite = new THREE.MeshStandardMaterial({
            color: 0xfcfcfa,
            roughness: 0.28,
            metalness: 0.03,
            side: THREE.DoubleSide
        });
        const airframeWhiteDim = new THREE.MeshStandardMaterial({ color: 0xece9e1, roughness: 0.44, side: THREE.DoubleSide });
        const deepTeal = new THREE.MeshStandardMaterial({
            color: 0x0b2b2b,
            roughness: 0.35
        });
        const deepTealPanel = new THREE.MeshStandardMaterial({ color: 0x0d2e2c, roughness: 0.35, side: THREE.DoubleSide });
        const carbonMat = new THREE.MeshStandardMaterial({ color: 0x141414, roughness: 0.28, metalness: 0.45 });
        const motorMat = new THREE.MeshStandardMaterial({ color: 0x1c1c1c, roughness: 0.4, metalness: 0.35 });
        const propMat = new THREE.MeshStandardMaterial({ color: 0xd7d7d3, roughness: 0.32, metalness: 0.08, side: THREE.DoubleSide });
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x181818, roughness: 0.15, metalness: 0.15 });
        const antennaBallMat = new THREE.MeshStandardMaterial({ color: 0x35e6cf, emissive: 0x0fae9c, emissiveIntensity: 0.9, roughness: 0.25 });
        const rodMat = new THREE.MeshStandardMaterial({ color: 0x141414, roughness: 0.35 });
        const lockMat = new THREE.MeshStandardMaterial({ color: 0xd0392b, roughness: 0.4 });

        function box(w, h, d, mat) { return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat); }
        function cyl(r1, r2, h, mat, seg = 14) { return new THREE.Mesh(new THREE.CylinderGeometry(r1, r2, h, seg), mat); }
        function sph(r, mat, seg = 16) { return new THREE.Mesh(new THREE.SphereGeometry(r, seg, seg), mat); }

        // Tapered wing panel: spans local +x from x0 (chord c0) to x1 (chord c1),
        // chord measured along z, extruded thickness along y.
        function taperedPanel(x0, x1, c0, c1, thickness, mat) {
            const shape = new THREE.Shape();
            shape.moveTo(x0, -c0 / 2);
            shape.lineTo(x0, c0 / 2);
            shape.lineTo(x1, c1 / 2);
            shape.lineTo(x1, -c1 / 2);
            shape.lineTo(x0, -c0 / 2);
            const geo = new THREE.ExtrudeGeometry(shape, { depth: thickness, bevelEnabled: false });
            geo.translate(0, 0, -thickness / 2);
            geo.rotateX(Math.PI / 2);
            const mesh = new THREE.Mesh(geo, mat);
            return mesh;
        }

        // ---------------- Fuselage: slender torpedo pod, white top / dark teal belly stripe + nose ----------------
        const fuselageGroup = new THREE.Group();

        const podBody = sph(0.09, airframeWhite, 20);
        podBody.scale.set(3.35, 0.95, 0.95);
        podBody.position.set(0.06, 0, 0);
        fuselageGroup.add(podBody);

        // dark teal belly stripe running most of the pod length, wider/lower like the reference photos
        const bellyShell = sph(0.083, deepTeal, 20);
        bellyShell.scale.set(2.85, 0.62, 0.8);
        bellyShell.position.set(0.10, -0.028, 0);
        fuselageGroup.add(bellyShell);

        const canopyHatch = sph(0.048, deepTeal, 16);
        canopyHatch.scale.set(1.15, 0.5, 0.8);
        canopyHatch.position.set(0.19, 0.045, 0);
        fuselageGroup.add(canopyHatch);

        const noseCap = sph(0.042, airframeWhite, 14);
        noseCap.position.set(0.345, -0.005, 0);
        fuselageGroup.add(noseCap);

        // small sensor window on top
        const topPanel = box(0.045, 0.004, 0.028, glassMat);
        topPanel.position.set(0.06, 0.072, 0);
        fuselageGroup.add(topPanel);

        // nose camera nub, angled slightly down like reference
        const camNub = cyl(0.011, 0.013, 0.02, glassMat, 10);
        camNub.rotation.z = Math.PI / 2 + 0.25;
        camNub.position.set(0.355, -0.045, 0);
        fuselageGroup.add(camNub);
        const camBody = box(0.028, 0.02, 0.02, motorMat);
        camBody.position.set(0.335, -0.05, 0);
        fuselageGroup.add(camBody);

        // antenna mast + glowing teal ball, mounted forward on the canopy
        const mast = cyl(0.0035, 0.0035, 0.055, rodMat, 8);
        mast.position.set(0.185, 0.105, 0);
        fuselageGroup.add(mast);
        const antennaBall = sph(0.013, antennaBallMat, 12);
        antennaBall.position.set(0.185, 0.135, 0);
        fuselageGroup.add(antennaBall);

        function makeIndianFlag() {
            const flag = new THREE.Group();
            const w = 0.07;
            const h = 0.013;
            const d = 0.002;
            const saf = box(w, h, d, new THREE.MeshBasicMaterial({ color: 0xFF9933 }));
            saf.position.y = h;
            const wht = box(w, h, d, new THREE.MeshBasicMaterial({ color: 0xFFFFFF }));
            wht.position.y = 0;
            const grn = box(w, h, d, new THREE.MeshBasicMaterial({ color: 0x138808 }));
            grn.position.y = -h;
            flag.add(saf, wht, grn);

            const chakra = new THREE.Mesh(new THREE.TorusGeometry(0.004, 0.001, 4, 16), new THREE.MeshBasicMaterial({ color: 0x000080 }));
            chakra.position.set(0, 0, d * 0.51);
            flag.add(chakra);
            return flag;
        }

        const flagL = makeIndianFlag();
        flagL.position.set(0.05, 0, 0.091);
        fuselageGroup.add(flagL);

        const flagR = makeIndianFlag();
        flagR.position.set(0.05, 0, -0.091);
        flagR.rotation.y = Math.PI;
        fuselageGroup.add(flagR);

        scene.add(fuselageGroup);

        // ---------------- Boom + V-tail ----------------
        const boomLen = 0.75;
        const boomStartX = -0.225;
        const boomEndX = boomStartX - boomLen;

        const boom = cyl(0.013, 0.013, boomLen, carbonMat, 10);
        boom.rotation.z = Math.PI / 2;
        boom.position.set(boomStartX - boomLen / 2, -0.012, 0);
        scene.add(boom);

        const tailGroup = new THREE.Group();
        tailGroup.position.set(boomEndX, -0.012, 0);
        scene.add(tailGroup);

        const tailHub = box(0.046, 0.042, 0.046, deepTeal);
        tailGroup.add(tailHub);

        function tailPanel(sign) {
            const p = new THREE.Group();
            const wingPart = taperedPanel(0, 0.315, 0.15, 0.06, 0.013, airframeWhite);
            p.add(wingPart);
            const rootFair = box(0.05, 0.02, 0.02, deepTealPanel);
            rootFair.position.set(0.018, 0, 0);
            p.add(rootFair);
            p.rotation.x = sign * (38 * Math.PI / 180); // dihedral V, splayed outward+up per reference
            p.rotation.y = sign * (16 * Math.PI / 180); // slight sweep
            return p;
        }
        const tailPanelL = tailPanel(1);
        const tailPanelR = tailPanel(-1);
        tailGroup.add(tailPanelL, tailPanelR);

        // ---------------- Root stub: fixed to fuselage, never rotates ----------------
        function flightBasis(side) {
            const colX = new THREE.Vector3(0, 0, side);
            const colY = new THREE.Vector3(0, 1, 0);
            const colZ = new THREE.Vector3(-side, 0, 0);
            return new THREE.Matrix4().makeBasis(colX, colY, colZ);
        }
        function foldedBasis(side) {
            const colX = new THREE.Vector3(-1, 0, 0);
            const colY = new THREE.Vector3(0, 0, -side);
            const colZ = new THREE.Vector3(0, -side, 0);
            return new THREE.Matrix4().makeBasis(colX, colY, colZ);
        }

        function makeRootStub(side) {
            const g = new THREE.Group();
            const panel = taperedPanel(0, rootStubLen, rootChord, stubTipChord, wingThick, airframeWhiteDim);
            g.add(panel);
            // teal fairing skirt covering the hinge mechanism at the fuselage joint
            const fairing = box(rootStubLen * 0.9, wingThick * 1.6, rootChord * 0.42, deepTealPanel);
            fairing.position.set(rootStubLen * 0.35, 0, side * rootChord * 0.18);
            g.add(fairing);
            g.position.set(0, 0, 0);
            g.quaternion.setFromRotationMatrix(flightBasis(side));
            return g;
        }
        scene.add(makeRootStub(1));
        scene.add(makeRootStub(-1));

        // ---------------- Rotating wing assembly (mechanics unchanged) ----------------
        function makeRotatingWing(side) {
            const g = new THREE.Group();
            g.position.set(0, 0, side * rootStubLen);

            const panel = taperedPanel(0, rotatingSpan, stubTipChord, tipChord, wingThick, airframeWhite);
            g.add(panel);

            const spar = cyl(0.007, 0.007, rotatingSpan, carbonMat);
            spar.rotation.z = Math.PI / 2;
            spar.position.set(rotatingSpan / 2, 0, 0);
            g.add(spar);

            // boom-mounted nacelle: slender white cylindrical pod with black motor + prop on top,
            // matching the raised wingtip-boom motor mounts seen in the reference photos
            function nacelle(spanFromHinge) {
                const ng = new THREE.Group();
                const strut = cyl(0.009, 0.009, 0.09, airframeWhite, 10);
                strut.position.set(0, -0.045, 0);
                ng.add(strut);
                const pod = cyl(0.024, 0.024, 0.14, airframeWhite, 14);
                pod.rotation.x = Math.PI / 2;
                pod.position.set(0, -0.095, 0);
                ng.add(pod);

                // Position motor, hub, and prop at the forward end of the pod (facing frontward)
                const zDir = -side; // For left wing (side=1) forward is -Z. For right wing (side=-1) forward is +Z.
                const motorZ = zDir * (0.07 + 0.014);
                const hubZ = zDir * (0.07 + 0.028 + 0.009);
                const propZ = zDir * (0.07 + 0.028 + 0.018 + 0.001);

                const motor = cyl(0.019, 0.021, 0.028, motorMat, 14);
                motor.rotation.x = Math.PI / 2;
                motor.position.set(0, -0.095, motorZ);
                ng.add(motor);

                const hub = cyl(0.007, 0.007, 0.018, motorMat, 10);
                hub.rotation.x = Math.PI / 2;
                hub.position.set(0, -0.095, hubZ);
                ng.add(hub);

                const prop = box(0.235, 0.006, 0.02, propMat);
                // Propeller rotates in the XY plane (perpendicular to Z axis)
                prop.position.set(0, -0.095, propZ);
                ng.add(prop);

                ng.position.set(spanFromHinge, 0, 0);
                return ng;
            }
            g.add(nacelle(innerNacelleSpanFromHinge));
            g.add(nacelle(outerNacelleSpanFromHinge));

            const lock = sph(0.01, lockMat, 8);
            lock.position.set(0.02, 0, 0);
            g.add(lock);
            g.userData.lock = lock;

            g.userData.qFlight = new THREE.Quaternion().setFromRotationMatrix(flightBasis(side));
            g.userData.qFolded = new THREE.Quaternion().setFromRotationMatrix(foldedBasis(side));
            return g;
        }
        const wingL = makeRotatingWing(1);
        const wingR = makeRotatingWing(-1);
        scene.add(wingL, wingR);

        const hingePinL = cyl(0.012, 0.012, 0.03, motorMat);
        hingePinL.rotation.x = Math.PI / 2; hingePinL.position.set(0, 0, rootStubLen);
        const hingePinR = cyl(0.012, 0.012, 0.03, motorMat);
        hingePinR.rotation.x = Math.PI / 2; hingePinR.position.set(0, 0, -rootStubLen);
        scene.add(hingePinL, hingePinR);

        // servo + winch drum (unchanged mechanic), pushrod-style linkage lines to wing roots
        const drumPos = new THREE.Vector3(0.20, 0.045, 0);
        const servoBody = cyl(0.018, 0.018, 0.045, motorMat);
        servoBody.rotation.x = Math.PI / 2; servoBody.position.copy(drumPos);
        scene.add(servoBody);
        const drum = cyl(0.02, 0.02, 0.007, new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.4 }));
        drum.rotation.x = Math.PI / 2; drum.position.copy(drumPos);
        scene.add(drum);

        const pulleyL = cyl(0.011, 0.011, 0.007, motorMat, 10);
        pulleyL.rotation.x = Math.PI / 2; pulleyL.position.set(0, 0.01, rootStubLen * 0.6);
        const pulleyR = cyl(0.011, 0.011, 0.007, motorMat, 10);
        pulleyR.rotation.x = Math.PI / 2; pulleyR.position.set(0, 0.01, -rootStubLen * 0.6);
        scene.add(pulleyL, pulleyR);

        const cableMat = new THREE.LineBasicMaterial({ color: 0x1a1a1a });
        const kevGeomL = new THREE.BufferGeometry();
        const kevGeomR = new THREE.BufferGeometry();
        scene.add(new THREE.Line(kevGeomL, cableMat));
        scene.add(new THREE.Line(kevGeomR, cableMat));

        // tail pushrods: from servo area back to tail hub (rigid-looking linkage as in reference)
        const tailRodGeomL = new THREE.BufferGeometry();
        const tailRodGeomR = new THREE.BufferGeometry();
        scene.add(new THREE.Line(tailRodGeomL, cableMat));
        scene.add(new THREE.Line(tailRodGeomR, cableMat));
        const tailAnchorFwd = new THREE.Vector3(0.02, 0.05, 0);

        const labelDefs = [];
        const labelsDiv = document.getElementById('labels');
        const labelEls = labelDefs.map(d => {
            const el = document.createElement('div');
            el.className = 'label'; el.textContent = d.text;
            labelsDiv.appendChild(el);
            return el;
        });

        function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

        const tailFoldedZ = 100 * Math.PI / 180;
        const tailFlightZ = 0;

        function update(tRaw) {
            const t = Math.max(0, Math.min(1, tRaw));
            const tensionPhase = Math.min(1, t / 0.25);
            const rotatePhase = t <= 0.25 ? 0 : easeInOutCubic((t - 0.25) / 0.75);

            wingL.quaternion.slerpQuaternions(wingL.userData.qFolded, wingL.userData.qFlight, rotatePhase);
            wingR.quaternion.slerpQuaternions(wingR.userData.qFolded, wingR.userData.qFlight, rotatePhase);

            tailGroup.rotation.z = tailFoldedZ + (tailFlightZ - tailFoldedZ) * rotatePhase;

            drum.rotation.y = rotatePhase * Math.PI * 6;

            const cableSlackStart = 0.09;
            const cableTaut = 0.018;
            const cableLen = cableSlackStart - tensionPhase * (cableSlackStart - cableTaut);
            const anchorL = new THREE.Vector3(cableLen, 0, rootStubLen * 0.75);
            const anchorR = new THREE.Vector3(cableLen, 0, -rootStubLen * 0.75);
            kevGeomL.setFromPoints([drumPos, pulleyL.position, anchorL]);
            kevGeomR.setFromPoints([drumPos, pulleyR.position, anchorR]);
            kevGeomL.attributes.position.needsUpdate = true;
            kevGeomR.attributes.position.needsUpdate = true;

            const tailHubWorldTop = new THREE.Vector3(0.03, 0.03, 0).applyMatrix4(tailGroup.matrixWorld ? tailGroup.matrixWorld : new THREE.Matrix4());
            const tailHubWorldBottom = new THREE.Vector3(0.03, -0.02, 0).applyMatrix4(tailGroup.matrixWorld ? tailGroup.matrixWorld : new THREE.Matrix4());
            tailRodGeomL.setFromPoints([tailAnchorFwd, tailHubWorldTop]);
            tailRodGeomR.setFromPoints([new THREE.Vector3(0.02, 0.05, -0.02), tailHubWorldBottom]);
            tailRodGeomL.attributes.position.needsUpdate = true;
            tailRodGeomR.attributes.position.needsUpdate = true;

            const lockGlow = rotatePhase > 0.97 ? 0.7 : 0.2;
            wingL.userData.lock.material.emissive = new THREE.Color(lockGlow, 0, 0);
            wingR.userData.lock.material.emissive = new THREE.Color(lockGlow, 0, 0);

            const out = document.getElementById('foldOut');
            if (t < 0.03) out.textContent = 'Folded, stowed';
            else if (t > 0.97) out.textContent = 'Flight, wings + tail extended';
            else if (t < 0.25) out.textContent = 'Cable tensioning';
            else out.textContent = Math.round(rotatePhase * 100) + '% deployed';

            document.getElementById('fold').value = Math.round(t * 100);
        }
        update(0);

        document.getElementById('fold').addEventListener('input', e => {
            update(e.target.value / 100);
        });

        let animId = null;
        function playAnim(from, to, duration) {
            if (animId) cancelAnimationFrame(animId);
            const start = performance.now();
            function step(now) {
                const p = Math.min(1, (now - start) / duration);
                update(from + (to - from) * p);
                if (p < 1) animId = requestAnimationFrame(step);
            }
            animId = requestAnimationFrame(step);
        }
        document.getElementById('playDeploy').addEventListener('click', () => playAnim(0, 1, 3500));
        document.getElementById('playFold').addEventListener('click', () => playAnim(1, 0, 3500));

        const camPresets = {
            wide: { pos: [1.8, 1.3, 2.0], target: [0, 0, 0] },
            top: { pos: [0, 2.5, 0.01], target: [0, 0, 0] },
            hinge: { pos: [0.3, 0.25, 0.35], target: [0, 0, rootStubLen] }
        };
        document.querySelectorAll('[data-cam]').forEach(btn => {
            btn.addEventListener('click', () => {
                const p = camPresets[btn.dataset.cam];
                camera.position.set(...p.pos);
                controls.target.set(...p.target);
            });
        });

        function updateLabels() {
            labelDefs.forEach((d, i) => {
                const el = labelEls[i];
                const wp = new THREE.Vector3();
                d.obj.getWorldPosition(wp);
                if (d.offset) wp.add(new THREE.Vector3(...d.offset));
                wp.project(camera);
                el.style.left = ((wp.x * 0.5 + 0.5) * innerWidth) + 'px';
                el.style.top = ((-wp.y * 0.5 + 0.5) * innerHeight) + 'px';
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            updateLabels();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });
    </script>
</body>

</html>
